<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hongyi Li</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .top {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .avatar {
      width: 140px;
      border-radius: 10px;
    }

    h1 {
      margin: 0;
    }

    .info {
      color: #555;
      margin-top: 10px;
    }

    h2 {
      margin-top: 40px;
      border-bottom: 2px solid #eee;
      padding-bottom: 6px;
    }

    .publication {
      margin: 22px 0;
    }

    .pub-title {
      font-weight: 600;
    }

    .buttons {
      margin-top: 6px;
    }

    .button {
      display: inline-block;
      padding: 4px 10px;
      margin-right: 6px;
      border: 1px solid #0066cc;
      border-radius: 6px;
      color: #0066cc;
      font-size: 13px;
      text-decoration: none;
    }

    .button:hover {
      background: #0066cc;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top">
    <img src="avatar.jpg" class="avatar" />

    <div>
      <h1>Hongyi Li</h1>
      <div class="info">
        Ph.D. Student, HIT Shenzhen<br>
        Email: 23b904015@stu.hit.edu.cn<br>
        GitHub: <a href="https://github.com/Hongyi-Li-sz">Hongyi-Li-sz</a>
      </div>
    </div>
  </div>

  <p>
    I am a Ph.D. student focusing on machine learning, optimization, and intelligent control.
    My research includes interpretable models, tree methods, and model predictive control.
  </p>

  <h2>Publications</h2>
  <div id="publications"></div>

</div>

<script>
const publications = [
  {
    year: 2026,
    title: "Hinge Regression Tree: A Newton Method for Oblique Regression Tree Splitting",
    authors: "<strong>Hongyi Li</strong>, Han Lin, and Jun Xu",
    venue: "ICLR 2026",
    pdf: "https://arxiv.org/pdf/2602.05371",
    paper: "https://openreview.net/forum?id=3pZwJB6SX9",
    code: "https://github.com/Hongyi-Li-sz/Hinge-Regression-Tree"
  },
  {
    year: 2026,
    title: "Distributed MPC for Energy and Comfort Optimization in Buildings",
    authors: "<strong>Hongyi Li</strong>, Jun Xu, and Jin-Feng Liu",
    venue: "IEEE RA-L 2026",
    pdf: "https://arxiv.org/pdf/2602.05376",
    paper: "https://doi.org/10.1109/LRA.2026.3665065"
  },
  {
    year: 2025,
    title: "Priority-Based Energy Allocation in Buildings",
    authors: "<strong>Hongyi Li</strong>, Jun Xu, and Qianchuan Zhao",
    venue: "IEEE TASE 2025",
    pdf: "https://arxiv.org/pdf/2403.13648",
    paper: "https://doi.org/10.1109/TASE.2024.3464612"
  },
  {
    year: 2024,
    title: "Economic MPC in Buildings via Piecewise Linear Approximation",
    authors: "<strong>Hongyi Li</strong>, Jun Xu, Q. Zhao, and S. Wang",
    venue: "IEEE TASE 2024",
    pdf: "https://doi.org/10.1109/TASE.2023.3279278",
    paper: "https://doi.org/10.1109/TASE.2023.3279278"
  }
];

publications.sort((a, b) => b.year - a.year);

const container = document.getElementById("publications");

publications.forEach(pub => {
  const div = document.createElement("div");
  div.className = "publication";

  div.innerHTML = `
    <div class="pub-title">${pub.title}</div>
    <div>${pub.authors}</div>
    <div>${pub.venue}</div>
    <div class="buttons">
      <a class="button" href="${pub.pdf}" target="_blank">PDF</a>
      <a class="button" href="${pub.paper}" target="_blank">Paper</a>
      ${pub.code ? `<a class="button" href="${pub.code}" target="_blank">Code</a>` : ""}
    </div>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
